<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Justok 搭建小破站 Project web,Html,CSS,JavaScript">
    <meta name="keywords" content="项目 build Project">
    <title>JUSTOK 搭建小破站</title>
    <script src="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/vue/3.2.31/vue.global.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="./index.css">
    <link rel="stylesheet" href="./card.css">
    <script src="https://unpkg.com/@waline/client@v2/dist/waline.js"></script>
    <link href='https://unpkg.com/@waline/client@v2/dist/waline.css' rel='stylesheet' />
    <!-- <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script> -->
</head>
<body>
    <div id="app">
        <div class="loading" id="loading"><img src="https://s21.ax1x.com/2024/08/02/pkX76Rs.png" alt="Loaded Image"></div>
        <div class="rain"></div>
        <div id="content" style="display: none;">
            <div style="display: flex;flex-direction: column;justify-content: center;align-items: center; height: 100%;">
                <div class="error-container animate__animated animate__fadeInDown">
                    <div class="header">
                        <div class="error-icon animate__animated animate__wobble animate__delay-1s">{{emoji}}</div>
                        <div class="error-code">ERROR 404</div>
                    </div>
                    <div class="error-message">{{person.errormessage}}</div>
                    <hr style="border-top: 2px solid #999999;">
                    <div class="error-description">{{person.errordescription}}</div>
                    <div class="error-suggestions">
                        <span id="sug1">{{person.sug1}}</span>
                        <ul>
                            <li>
                                <div><a href="#" id="sug2" @click="startRedEnvelopeRain(1)">{{person.sug2}}</a></div>
                            </li>
                            <li>
                                <div><a href="#" id="sug3" @click="startRedEnvelopeRain(2)">{{person.sug3}}</a></div>
                            </li>
                            <li>
                                <div><a href="#" id="sug4" @click="startRedEnvelopeRain(3)">{{person.sug4}}</a></div>
                            </li>
                        </ul>
                    </div>
                    <div class="error-status">ERR_CONNECTION_REFUSED</div>
                </div>

                <div class="cards animate__animated animate__fadeInUp">
                    <section v-for="card in cards" :id="card.id" :class="card.clas">
                        <div v-if="card.clas=='qcards'" v-for="qcard in card.qcards" :class="qcard.qclas" :id="qcard.qid">
                            <span class="":style="qcard.qstyle" v-html="qcard.icon"></span>
                            <div v-if="qcard.qid" class="qcard__content" :id="qcard.qcid">
                                <p class="qcard__title">{{qcard.qtitle}}</p>
                                <p class="qcard__description" v-html="qcard.description"></p>
                                <button @click="openLink(qcard.url)" class="cb">Go</button>
                            </div>
                        </div>
                        <span v-if="card.clas!='qcards'" :style="card.cstyle" v-html="card.icon"></span>
                        <div v-if="card.clas!='qcards' && card.ccid" class="card__content" :id="card.ccid">
                            <p class="card__title">{{card.ctitle}}</p>
                            <p class="card__description" v-html="card.description"></p>
                            <button v-if="card.gosvg" @click="openLink(card.url)" class="cb" :id="card.bid">
                                <div class="svg-wrapper-1">
                                    <div class="svg-wrapper">{{card.gosvg}}</div>
                                </div>
                                <span>Go</span>
                            </button>
                        </div>
                    </section>
                </div>
            </div>
            <div ref="waline" id="waline" class="animate__animated animate__fadeInUp"></div>
        </div>
    </div>
</body>
<script src="./indexvue.js"></script>
</html>
